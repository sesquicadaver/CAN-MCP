name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analysis:
    name: codimension_core + codimension_mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install analysis packages and test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy pyflakes radon jedi vulture
          pip install -e ./codimension_core -e ./codimension_mcp

      - name: Ruff (core + mcp)
        run: ruff check codimension_core codimension_mcp

      - name: Mypy (core)
        working-directory: codimension_core
        run: mypy codimension_core

      - name: Pytest (core + mcp + headless unit tests)
        run: |
          python -m pytest \
            tests/test_codimension_core*.py \
            tests/test_codimension_mcp.py \
            tests/test_brief_ast.py \
            tests/test_flow_ast.py \
            tests/test_importutils.py \
            tests/test_gitstatusparser.py \
            tests/test_todoscanner.py \
            tests/test_binfiles.py \
            tests/test_occurrencesprovider.py \
            tests/test_lint_drivers.py \
            tests/test_greenlet_trace.py \
            tests/test_astview.py \
            -q

  security:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt
