name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analysis:
    name: codimension_core + codimension_mcp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install analysis packages and test tools
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy pyflakes radon jedi vulture mistune pygments
          pip install -e ./codimension_core -e ./codimension_mcp

      - name: Ruff (core + mcp)
        run: ruff check codimension_core codimension_mcp

      - name: Mypy (core)
        working-directory: codimension_core
        run: mypy codimension_core

      - name: Pytest (full headless suite, skip pyqt)
        run: python -m pytest tests/ -m "not pyqt" -q

  security:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (requirements.txt)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt
